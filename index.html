    // ============================================
    // アニメーション付き金額表示
    // ============================================
    function AnimatedPrice({value,className}){
      className=className||'';
      const[displayValue,setDisplayValue]=useState(value);
      const prevValue=useRef(value);
      useEffect(()=>{
        if(prevValue.current===value)return;
        const start=prevValue.current,end=value,duration=400,startTime=Date.now();
        const animate=()=>{
          const elapsed=Date.now()-startTime,progress=Math.min(elapsed/duration,1);
          const easeOut=1-Math.pow(1-progress,3);
          setDisplayValue(Math.round(start+(end-start)*easeOut));
          if(progress<1)requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
        prevValue.current=value;
      },[value]);
      return h('span',{className},'\u00a5'+displayValue.toLocaleString());
    }

    // ============================================
    // メインアプリケーション

    function App(){
      const[step,setStep]=useState(1);
      const[selectedTravelBand,setSelectedTravelBand]=useState(null);
      const[isTrouble,setIsTrouble]=useState(null);
      const[selectedDevices,setSelectedDevices]=useState([]);
      const[selectedWorks,setSelectedWorks]=useState({});
      const[selectedOptions,setSelectedOptions]=useState({});
      const[copySuccess,setCopySuccess]=useState(false);
      const totalSteps=6;

      const needsRevisit=()=>{
        const allSelected={...selectedWorks,...selectedOptions};
        return Object.values(allSelected).some(item=>item&&item.requiresRevisit);
      };

      const calculateTotal=()=>{
        let total=0;
        let breakdown={travel:0,revisit:0,works:[],options:[]};
        if(selectedTravelBand){breakdown.travel=selectedTravelBand.price;total+=selectedTravelBand.price}
        if(needsRevisit()&&selectedTravelBand){breakdown.revisit=selectedTravelBand.revisit;total+=selectedTravelBand.revisit}
        Object.values(selectedWorks).forEach(item=>{if(item){breakdown.works.push(item);total+=item.price}});
        Object.values(selectedOptions).forEach(item=>{if(item){breakdown.options.push(item);total+=item.price}});
        return{total,breakdown};
      };

      const{total,breakdown}=calculateTotal();

      const toggleDevice=(deviceId)=>{
        setSelectedDevices(prev=>{
          const isCurrentlySelected=prev.includes(deviceId);
          if(isCurrentlySelected){
            const newWorks={...selectedWorks};
            Object.keys(newWorks).forEach(key=>{if(deviceId==='DATA'&&key.startsWith('T_DATA'))delete newWorks[key]});
            setSelectedWorks(newWorks);
            return prev.filter(id=>id!==deviceId);
          }else{
            if(deviceId==='DATA'){
              const inspectItem=PRICE_DATA.menu.trouble.DATA.find(item=>item.id==='T_DATA_INSPECT');
              if(inspectItem)setSelectedWorks(prevWorks=>({...prevWorks,[inspectItem.id]:inspectItem}));
            }
            return[...prev,deviceId];
          }
        });
      };

      const selectWork=(item)=>{
        if(item.id==='T_DATA_INSPECT'&&selectedWorks[item.id])return;
        setSelectedWorks(prev=>{
          const newWorks={...prev};
          Object.keys(newWorks).forEach(key=>{if(newWorks[key]&&newWorks[key].choiceGroup===item.choiceGroup)delete newWorks[key]});
          if(prev[item.id]&&item.id!=='T_DATA_INSPECT'){delete newWorks[item.id]}else{newWorks[item.id]=item}
          return newWorks;
        });
      };

      const selectOption=(item)=>{
        setSelectedOptions(prev=>{
          const newOptions={...prev};
          Object.keys(newOptions).forEach(key=>{if(newOptions[key]&&newOptions[key].choiceGroup===item.choiceGroup)delete newOptions[key]});
          if(prev[item.id]){delete newOptions[item.id]}else{newOptions[item.id]=item}
          return newOptions;
        });
      };

      const getCurrentMenu=()=>isTrouble?PRICE_DATA.menu.trouble:PRICE_DATA.menu.notTrouble;
      const nextStep=()=>{if(step<totalSteps)setStep(step+1)};
      const prevStep=()=>{if(step>1)setStep(step-1)};
      const reset=()=>{setStep(1);setSelectedTravelBand(null);setIsTrouble(null);setSelectedDevices([]);setSelectedWorks({});setSelectedOptions({});setCopySuccess(false)};

      const copyToClipboard=()=>{
        const now=new Date();
        const dateStr=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
        let text='━━━━━━━━━━━━━━━━━━━━\n　お見積書\n　ITライフワークデザイン\n━━━━━━━━━━━━━━━━━━━━\n作成日: '+dateStr+'\n\n【内訳】\n';
        if(selectedTravelBand){text+='■ 出張費（'+selectedTravelBand.label+'）\n　 \u00a5'+selectedTravelBand.price.toLocaleString()+'\n'}
        if(needsRevisit()&&selectedTravelBand){text+='■ 再訪問費（'+selectedTravelBand.label+'）\n　 \u00a5'+selectedTravelBand.revisit.toLocaleString()+'\n'}
        if(breakdown.works.length>0){text+='■ 作業内容:\n';breakdown.works.forEach(item=>{text+='　・'+item.label+': \u00a5'+item.price.toLocaleString();if(item.note)text+=' ('+item.note+')';text+='\n'})}
        if(breakdown.options.length>0){text+='■ オプション:\n';breakdown.options.forEach(item=>{text+='　・'+item.label+': \u00a5'+item.price.toLocaleString();if(item.note)text+=' ('+item.note+')';text+='\n'})}
        text+='\n━━━━━━━━━━━━━━━━━━━━\n　合計金額: \u00a5'+total.toLocaleString()+'（税込）\n━━━━━━━━━━━━━━━━━━━━\n\n※ 部品代・特殊作業は別途ご相談\n※ 作業完了後のお支払いとなります\n';
        navigator.clipboard.writeText(text).then(()=>{setCopySuccess(true);setTimeout(()=>setCopySuccess(false),2500)}).catch(()=>{
          const textarea=document.createElement('textarea');textarea.value=text;document.body.appendChild(textarea);textarea.select();document.execCommand('copy');document.body.removeChild(textarea);setCopySuccess(true);setTimeout(()=>setCopySuccess(false),2500);
        });
      };

      const canProceed=()=>{
        switch(step){
          case 1:return selectedTravelBand!==null;
          case 2:return isTrouble!==null;
          case 3:return selectedDevices.length>0;
          case 4:return Object.keys(selectedWorks).length>0;
          case 5:return true;
          default:return true;
        }
      };

      // SVGアイコンヘルパー
      const svgIcon=(d,cls)=>h('svg',{className:cls||'w-5 h-5',fill:'none',viewBox:'0 0 24 24',stroke:'currentColor'},h('path',{strokeLinecap:'round',strokeLinejoin:'round',strokeWidth:2,d}));
      const svgIconFill=(d,cls)=>h('svg',{className:cls||'w-6 h-6',fill:'none',viewBox:'0 0 24 24',stroke:'currentColor'},h('path',{strokeLinecap:'round',strokeLinejoin:'round',strokeWidth:2,d}));

      return h('div',{className:'min-h-screen bg-gradient-to-b from-slate-50 to-slate-100'},
        // ヘッダー
        h('header',{className:'bg-gradient-to-r from-indigo-900 to-indigo-800 text-white px-4 py-5 shadow-lg sticky top-0 z-50'},
          h('div',{className:'max-w-lg mx-auto'},
            h('h1',{className:'text-lg font-bold tracking-wide text-center'},'ITライフワークデザイン'),
            h('p',{className:'text-indigo-200 text-sm text-center mt-1'},'お見積りシミュレーター')
          )
        ),
        // 合計金額バー
        h('div',{className:'bg-white border-b border-gray-200 px-4 py-4 shadow-sm sticky top-[76px] z-40'},
          h('div',{className:'max-w-lg mx-auto flex justify-between items-center'},
            h('div',null,
              h('span',{className:'text-gray-600 font-medium'},'合計金額'),
              needsRevisit()&&h('span',{className:'ml-2 text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full'},'再訪問費込')
            ),
            h(AnimatedPrice,{value:total,className:'text-3xl font-bold text-indigo-900'})
          )
        ),
        // ステップインジケーター
        h('div',{className:'max-w-lg mx-auto'},h(StepIndicator,{currentStep:step,totalSteps})),
        // メインコンテンツ
        h('main',{className:'max-w-lg mx-auto px-4 pb-32'},
          // Step 1: 出張エリア
          step===1&&h('div',{className:'space-y-4'},
            h('div',{className:'mb-6'},
              h('h2',{className:'text-xl font-bold text-gray-900'},'出張エリア'),
              h('p',{className:'text-gray-500 text-sm mt-1'},'ご訪問先をお選びください')
            ),
            h('div',{className:'space-y-3'},
              PRICE_DATA.travel.bands.map(band=>
                h(SelectionCard,{key:band.id,item:{...band,isSupported:true},isSelected:selectedTravelBand&&selectedTravelBand.id===band.id,onSelect:()=>setSelectedTravelBand(band)})
              )
            )
          ),
          // Step 2: トラブル or 通常作業
          step===2&&h('div',{className:'space-y-4'},
            h('div',{className:'mb-6'},
              h('h2',{className:'text-xl font-bold text-gray-900'},'ご依頼内容'),
              h('p',{className:'text-gray-500 text-sm mt-1'},'どちらに該当しますか？')
            ),
            h('div',{className:'space-y-3'},
              h(SelectionCard,{item:{id:'trouble',label:'トラブル対応',sublabel:'動かない・おかしい等の問題解決',icon:'🔧',price:null,isSupported:true},isSelected:isTrouble===true,onSelect:()=>{setIsTrouble(true);setSelectedDevices([]);setSelectedWorks({})},showPrice:false}),
              h(SelectionCard,{item:{id:'notTrouble',label:'設定・導入・相談',sublabel:'新規セットアップ・使い方など',icon:'✨',price:null,isSupported:true},isSelected:isTrouble===false,onSelect:()=>{setIsTrouble(false);setSelectedDevices([]);setSelectedWorks({})},showPrice:false})
            )
          ),
          // Step 3: デバイス選択
          step===3&&h('div',{className:'space-y-4'},
            h('div',{className:'mb-6'},
              h('h2',{className:'text-xl font-bold text-gray-900'},'対象機器'),
              h('p',{className:'text-gray-500 text-sm mt-1'},'該当するものをすべてお選びください（複数可）')
            ),
            h('div',{className:'grid grid-cols-2 gap-3'},
              PRICE_DATA.devices.map(device=>{
                const menu=getCurrentMenu();
                const hasItems=menu[device.id]&&menu[device.id].length>0;
                return h(DeviceCard,{key:device.id,device,isSelected:selectedDevices.includes(device.id),onToggle:toggleDevice,hasItems});
              })
            ),
            selectedDevices.length>0&&h('div',{className:'mt-4 p-3 bg-indigo-50 rounded-xl'},
              h('p',{className:'text-sm text-indigo-700'},h('span',{className:'font-semibold'},selectedDevices.length+'件'),'選択中')
            )
          ),
          // Step 4: 作業内容選択
          step===4&&h('div',{className:'space-y-6'},
            h('div',{className:'mb-4'},
              h('h2',{className:'text-xl font-bold text-gray-900'},'作業内容'),
              h('p',{className:'text-gray-500 text-sm mt-1'},'各機器の作業をお選びください')
            ),
            selectedDevices.map(deviceId=>{
              const device=PRICE_DATA.devices.find(d=>d.id===deviceId);
              const menu=getCurrentMenu();
              const items=menu[deviceId]||[];
              if(items.length===0)return null;
              const groups={};
              items.forEach(item=>{if(!groups[item.choiceGroup])groups[item.choiceGroup]=[];groups[item.choiceGroup].push(item)});
              return h('div',{key:deviceId,className:'space-y-3'},
                h('div',{className:'flex items-center gap-2 pb-2 border-b border-gray-200'},
                  h('span',{className:'text-2xl'},device.icon),
                  h('h3',{className:'text-lg font-bold text-gray-800'},device.label)
                ),
                Object.entries(groups).map(([groupId,groupItems])=>
                  h('div',{key:groupId,className:'space-y-2'},
                    groupItems.map(item=>h(SelectionCard,{key:item.id,item,isSelected:!!selectedWorks[item.id],onSelect:selectWork}))
                  )
                )
              );
            })
          ),
          // Step 5: オプション
          step===5&&h('div',{className:'space-y-4'},
            h('div',{className:'mb-6'},
              h('h2',{className:'text-xl font-bold text-gray-900'},'オプション'),
              h('p',{className:'text-gray-500 text-sm mt-1'},'追加作業があればお選びください（任意）')
            ),
            h('div',{className:'space-y-3'},
              PRICE_DATA.menu.options.filter(item=>{
                if(selectedDevices.includes('DATA')){
                  if(['BACKUP_GB','EXTRACT_GB','EXTRACT_INSPECTION'].includes(item.choiceGroup))return false;
                }
                return true;
              }).map(item=>h(SelectionCard,{key:item.id,item,isSelected:!!selectedOptions[item.id],onSelect:selectOption})),
              selectedDevices.includes('DATA')&&h('div',{className:'p-4 bg-blue-50 rounded-xl border border-blue-200'},
                h('p',{className:'text-sm text-blue-700'},'💡 データ復旧関連のオプションは、作業内容で選択済みのため表示されていません。')
              )
            )
          ),
          // Step 6: 確認画面
          step===6&&h('div',{className:'space-y-6'},
            h('div',{className:'bg-white rounded-2xl border-2 border-indigo-100 p-5 shadow-sm'},
              h('h3',{className:'font-bold text-gray-900 mb-4 flex items-center gap-2'},
                svgIcon('M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z','w-5 h-5 text-indigo-600'),
                'お見積り内容'
              ),
              h('div',{className:'space-y-3 text-sm'},
                selectedTravelBand&&h('div',{className:'flex justify-between py-2 border-b border-gray-100'},
                  h('span',{className:'text-gray-600'},'出張費'),
                  h('div',{className:'text-right'},
                    h('div',{className:'font-medium text-gray-900'},selectedTravelBand.label),
                    h('div',{className:'text-indigo-600'},'\u00a5'+selectedTravelBand.price.toLocaleString())
                  )
                ),
                needsRevisit()&&selectedTravelBand&&h('div',{className:'flex justify-between py-2 border-b border-gray-100 bg-blue-50 -mx-2 px-2 rounded'},
                  h('span',{className:'text-blue-700'},'🔄 再訪問費'),
                  h('div',{className:'text-right'},
                    h('div',{className:'font-medium text-blue-900'},selectedTravelBand.label),
                    h('div',{className:'text-blue-600'},'\u00a5'+selectedTravelBand.revisit.toLocaleString())
                  )
                ),
                breakdown.works.length>0&&h('div',{className:'py-2 border-b border-gray-100'},
                  h('span',{className:'text-gray-600 font-medium'},'作業内容'),
                  h('div',{className:'mt-2 space-y-2'},
                    breakdown.works.map(item=>
                      h('div',{key:item.id,className:'flex justify-between text-sm'},
                        h('div',null,
                          h('span',{className:'text-gray-700'},item.label),
                          item.note&&h('span',{className:'text-amber-600 text-xs ml-1'},'('+item.note+')')
                        ),
                        h('span',{className:'text-indigo-600 font-medium'},'\u00a5'+item.price.toLocaleString())
                      )
                    )
                  )
                ),
                breakdown.options.length>0&&h('div',{className:'py-2 border-b border-gray-100'},
                  h('span',{className:'text-gray-600 font-medium'},'オプション'),
                  h('div',{className:'mt-2 space-y-2'},
                    breakdown.options.map(item=>
                      h('div',{key:item.id,className:'flex justify-between text-sm'},
                        h('div',null,
                          h('span',{className:'text-gray-700'},item.label),
                          item.note&&h('span',{className:'text-amber-600 text-xs ml-1'},'('+item.note+')')
                        ),
                        h('span',{className:'text-indigo-600 font-medium'},'\u00a5'+item.price.toLocaleString())
                      )
                    )
                  )
                )
              ),
              h('div',{className:'mt-4 pt-4 border-t-2 border-indigo-200'},
                h('div',{className:'flex justify-between items-center'},
                  h('span',{className:'text-lg font-bold text-gray-900'},'合計金額'),
                  h('span',{className:'text-2xl font-bold text-indigo-900'},'\u00a5'+total.toLocaleString())
                ),
                h('p',{className:'text-xs text-gray-500 mt-1 text-right'},'税込')
              )
            ),
            h('button',{
              onClick:copyToClipboard,
              className:'w-full py-4 rounded-2xl font-bold text-lg transition-all duration-200 flex items-center justify-center gap-2 '+(copySuccess?'bg-green-500 text-white':'bg-indigo-100 text-indigo-700 hover:bg-indigo-200 active:scale-98')
            },
              copySuccess?h(Fragment,null,svgIconFill('M5 13l4 4L19 7'),'\u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f\uff01'):h(Fragment,null,svgIconFill('M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3'),'見積もりをテキストでコピー')
            )
          )
        ),
        // フッターナビゲーション
        h('footer',{className:'fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-4 shadow-lg'},
          h('div',{className:'max-w-lg mx-auto flex gap-3'},
            step>1&&h('button',{onClick:prevStep,className:'flex-1 py-4 rounded-2xl border-2 border-gray-300 text-gray-700 font-bold text-lg hover:bg-gray-50 active:scale-98 transition-all'},'戻る'),
            step<totalSteps?
              h('button',{
                onClick:nextStep,disabled:!canProceed(),
                className:'flex-1 py-4 rounded-2xl font-bold text-lg transition-all '+(canProceed()?'bg-indigo-600 text-white hover:bg-indigo-700 active:scale-98 shadow-md':'bg-gray-200 text-gray-400 cursor-not-allowed')
              },'次へ'):
              h('button',{onClick:reset,className:'flex-1 py-4 rounded-2xl bg-gray-800 text-white font-bold text-lg hover:bg-gray-900 active:scale-98 transition-all shadow-md'},'最初からやり直す')
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
